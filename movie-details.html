<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Movie Details</title>
    <!-- ඔයා දුන්න CSS ඔක්කොම මෙතනට දාන්න (කෝඩ් එක දිග නිසා මම ලියන්නේ නැහැ) -->
    <style>
        /* ඔයා දුන්න CSS මෙතනට දාන්න */
        body { opacity: 0; transition: opacity 0.8s ease; background: #0a0a0b; } /* Smooth Page Loading */
        .visible { opacity: 1; }
    </style>
</head>
<body onload="loadMovieDetails()">

<div class="movie-post-wrapper">
    <div class="glass-card">
        <div class="movie-details-sec">
            <img id="movieImg" src="" alt="Movie Poster" class="movie-poster">
            <div class="info-sec">
                <div class="title-wrapper">
                    <h1 id="movieTitle">Loading...</h1>
                    <span id="adultTag" class="adult-tag" style="display:none;">🔞 Only</span>
                </div>
                <div id="genres" class="genres-container"></div>
                
                <div class="meta-highlight-box">
                    <div class="meta-row"><strong>⏱ Duration:</strong> <span id="duration"></span></div>
                    <div class="meta-row"><strong>⭐ Rating:</strong> <span id="rating"></span></div>
                    <div class="meta-row"><strong>🎭 Casting:</strong> <span id="casting"></span></div>
                </div>
                
                <div class="movie-description">
                    <strong>📝 Story:</strong>
                    <span id="description"></span>
                </div>
            </div>
        </div>

        <div class="video-pointer-container">
            <p>Watch the Full Movie Down Here</p>
            <div class="arrow"><span></span><span></span><span></span></div>
        </div>

        <div class="custom-player-box" id="playerContainer">
           <button class="play-button-main" id="mainPlayBtn">▶</button>
            <div class="server-btns-wrapper" id="serverStep">
                <button class="server-btn" id="server1Btn">🎬 Server 1</button>
                <button class="server-btn" id="server2Btn">🎬 Server 2</button>
            </div>
            <div class="video-frame-wrapper" id="videoStep"></div>
        </div>
    </div>
</div>

<script src="script.js"></script> <!-- script.js එක ලින්ක් කරන්න -->
<script>
    function loadMovieDetails() {
        document.body.classList.add('visible'); // Fade-in effect
        
        const params = new URLSearchParams(window.location.search);
        const movieId = params.get('id');
        const movie = movies.find(m => m.id === movieId);

        if (movie) {
            document.getElementById('pageTitle').innerText = movie.title;
            document.getElementById('movieTitle').innerText = movie.title;
            document.getElementById('movieImg').src = movie.img;
            document.getElementById('duration').innerText = movie.duration;
            document.getElementById('rating').innerText = movie.rating;
            document.getElementById('casting').innerText = movie.casting;
            document.getElementById('description').innerText = movie.description;
            
            if(movie.adult) document.getElementById('adultTag').style.display = 'inline-block';

            // Video Player Logic
            const adLink = "https://omg10.com/4/9975772";
            const mainPlayBtn = document.getElementById('mainPlayBtn');
            const serverStep = document.getElementById('serverStep');
            const videoStep = document.getElementById('videoStep');
            const playerContainer = document.getElementById('playerContainer');

            let s1Clicks = 0, s2Clicks = 0;

            mainPlayBtn.addEventListener('click', () => {
                window.open(adLink, '_blank');
                mainPlayBtn.style.display = 'none';
                serverStep.style.display = 'flex';
            });

            document.getElementById('server1Btn').addEventListener('click', () => {
                if (s1Clicks === 0) { window.open(adLink, '_blank'); s1Clicks++; } 
                else { loadVideo(movie.server1); }
            });

            document.getElementById('server2Btn').addEventListener('click', () => {
                if (s2Clicks === 0) { window.open(adLink, '_blank'); s2Clicks++; } 
                else { loadVideo(movie.server2); }
            });

            function loadVideo(encodedUrl) {
                const videoUrl = atob(encodedUrl);
                serverStep.style.display = 'none';
                playerContainer.style.background = '#000';
                videoStep.style.display = 'block';
                videoStep.innerHTML = `<iframe width="100%" height="100%" src="${videoUrl}" frameborder="0" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>`;
            }
        }
    }
</script>
</body>
</html>
