<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineWave - Stream</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo" onclick="location.reload()">Cine<span>Wave</span></div>
        <div class="search-container">
            <div class="search-bar" id="searchBar">
                <input type="text" id="searchInput" placeholder="Search..." onkeyup="searchMovies()">
            </div>
            <i class="fas fa-search search-icon-btn" onclick="toggleSearch()"></i>
            <div id="suggestions" class="suggestions" style="position: absolute; top: 50px; right: 0; background: #111; z-index: 100;"></div>
        </div>
    </header>

    <!-- ෆිල්ම් පෙන්වන ප්‍රධාන කොටස -->
    <main id="homeContent"></main>

    <script src="script.js"></script>
    <script>window.onload = renderHome;</script>
</body>
</html>
