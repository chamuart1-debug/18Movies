<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineWave - Stream</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo" onclick="window.location.href='index.html'">Cine<span>Wave</span></div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search movies..." onkeyup="searchMovies()">
            <div id="suggestions" class="suggestions"></div>
        </div>
    </header>

    <div class="category-wrapper" style="text-align: center; padding: 20px;">
        <button class="cat-btn active" onclick="filterMovies('All')">All</button>
        <button class="cat-btn" onclick="filterMovies('Action')">Action</button>
        <button class="cat-btn" onclick="filterMovies('Sci-Fi')">Sci-Fi</button>
    </div>

    <main class="movie-grid" id="movieGrid"></main>

    <script src="script.js"></script>
    <script>
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const cat = params.get('cat');
            if(cat) {
                const filtered = movies.filter(m => m.category === cat);
                displayMovies(filtered);
            } else {
                displayMovies(movies);
            }
        };
    </script>
</body>
</html>
