<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineWave - Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="hero-slider">
    <div class="hero-slide active" style="background-image: linear-gradient(to right, rgba(0,0,0,0.9), transparent), url('https://m.media-amazon.com/images/M/MV5BMDdmZGU3NDQtY2E5My00ZTliLWIzOTUtMTY4ZGI1YjdiNjk3XkEyXkFqcGdeQXVyNTA4NzY1MzY@._V1_.jpg');">
        <div class="hero-content">
            <span class="badge">Trending</span>
            <h1>Avatar: The Way of Water</h1>
            <p>Jake Sully lives with his newfound family formed on the extrasolar moon Pandora.</p>
            <button class="play-now" onclick="goToDetails('avatar-2')">Watch Now</button>
        </div>
    </div>
</div>
        <div class="logo">Cine<span>Wave</span></div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search..." onkeyup="searchMovies()">
        </div>
    </header>

    <div class="category-wrapper">
        <div class="category-container" id="categorySlider">
            <button class="cat-btn active" onclick="filterMovies('All')">All</button>
            <button class="cat-btn" onclick="filterMovies('Action')">Action</button>
            <button class="cat-btn" onclick="filterMovies('Sci-Fi')">Sci-Fi</button>
            <!-- තව ඕන තරම් බටන් දාන්න -->
        </div>
    </div>

    <main class="movie-grid" id="movieGrid"></main>

    <script src="script.js"></script>
    <script>
        // පේජ් එක ලෝඩ් උන ගමන් ෆිල්ම් පෙන්වන්න
        window.onload = () => displayMovies(movies);
    </script>
</body>
</html>
